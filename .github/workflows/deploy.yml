name: Deploy
on:
  push:
    tags:
      - '*'
jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix-hosts: ${{ steps.set-matrix.outputs.hosts }}
    steps:
      - id: set-matrix
        env:
          SSH_HOSTS: ${{ secrets.SSH_HOSTS }}
        run: |
          # Convert "a,b,c" into ["a","b","c"] using jq
          # split(",") — breaks into array
          # map(gsub("^\\s+|\\s+$"; "")) — trims leading/trailing whitespace from each entry
          # map(select(length > 0)) — drops any empty strings (e.g. a trailing comma in the 
          JSON_ARRAY=$(jq -cn --arg hosts "$SSH_HOSTS" '$hosts | split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')
          echo "hosts=$JSON_ARRAY" >> $GITHUB_OUTPUT

  deploy:
    needs: setup-matrix
    runs-on: ubuntu-latest
    strategy:
      # Prevents other hosts from stopping if one host fails
      fail-fast: false
      matrix:
        host: ${{ fromJson(needs.setup-matrix.outputs.matrix-hosts) }}

    steps:
      - name: Reload Go Libraries on ${{ matrix.host }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ matrix.host }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            echo "Connected to target host: ${{ matrix.host }}"
            /usr/local/bin/build-go-mods
